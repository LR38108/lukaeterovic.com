<!DOCTYPE html>
<html lang="">
  <head>
    <link
  rel="preload"
  href="/assets/fonts/EBGaramond-Regular.woff2"
  as="font"
  type="font/woff2"
  crossorigin
>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luka Eterovic</title>

    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: black;
        z-index: 9999;
        flex-direction: column;
        gap: 24px;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }

      #initial-loader.initial-loader--done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #initial-loader img {
        width: 120px;
        opacity: 0.85;
      }

      .loader-line-track {
        width: 80px;
        height: 4px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
        border-radius: 2px;
      }

      .loader-line-fill {
        height: 100%;
        width: 100%;
        transform-origin: left center;
        transform: scaleX(0);
        will-change: transform;
        transition: transform 0.35s ease-out;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.15) 0%,
          rgba(255, 255, 255, 0.55) 45%,
          #ffffff 100%
        );
      }
    </style>
  </head>

  <body>
    <div id="initial-loader">
      <img src="/assets/logos/logo_white.svg" alt="Luka Eterović" />
      <div class="loader-line-track" aria-hidden="true">
        <div class="loader-line-fill"></div>
      </div>
    </div>
    <div id="app"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
